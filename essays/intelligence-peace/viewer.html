<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essay Viewer — George</title>
<link rel="stylesheet" href="../../dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<nav>
  <a href="../../" class="breadcrumb">&larr; George Dashboard</a>
  <h1 id="essay-title">Loading...</h1>
  <div class="subtitle" id="essay-subtitle">Essay Viewer</div>
  <div class="sidebar-progress" id="sidebar-progress"></div>

  <div class="section-label">Essay Pipeline</div>
  <div id="nav-stages"></div>

  <div class="section-label" id="research-label" style="display:none">Research Briefs</div>
  <div id="nav-research"></div>
</nav>

<main>
  <div id="content"><div class="loading">Loading...</div></div>
</main>

<button class="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8593;</button>

<script>
const STAGE_ORDER = ['00-hunch','00b-seeds','01-intake','02-strategy','03-research','04-draft','05-polish'];

// Determine essay slug from URL path
function getSlug() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  // viewer.html is at essays/<slug>/viewer.html — slug is second-to-last
  return parts[parts.length - 2] || '';
}

async function init() {
  try {
    const resp = await fetch('../../george.json');
    const manifest = await resp.json();
    const slug = getSlug();
    const essay = manifest.essays.find(e => e.slug === slug);
    if (!essay) {
      document.getElementById('content').innerHTML = '<div class="loading">Essay not found in manifest</div>';
      return;
    }
    buildSidebar(essay);
    const hash = location.hash.slice(1);
    const defaultFile = findDefaultFile(essay);
    loadFile(hash || defaultFile);
  } catch (e) {
    // Fallback: manifest unavailable, load directly
    loadFile(location.hash.slice(1) || '03-research.md');
  }
}

function findDefaultFile(essay) {
  // Default to the latest complete stage
  const keys = STAGE_ORDER.filter(k => essay.stages[k]);
  for (let i = keys.length - 1; i >= 0; i--) {
    if (essay.stages[keys[i]].status === 'complete') {
      return essay.stages[keys[i]].file;
    }
  }
  return '00-hunch.md';
}

function buildSidebar(essay) {
  // Title
  document.getElementById('essay-title').textContent = essay.title;
  document.getElementById('essay-subtitle').textContent = essay.target;
  document.title = essay.title + ' — George';

  // Progress pips
  const progressEl = document.getElementById('sidebar-progress');
  const keys = STAGE_ORDER.filter(k => essay.stages[k]);
  progressEl.innerHTML = keys.map(k => {
    const cls = essay.stages[k].status === 'complete' ? 'complete' : '';
    return '<span class="pip ' + cls + '" title="' + essay.stages[k].label + '"></span>';
  }).join('');

  // Stage links
  const stagesEl = document.getElementById('nav-stages');
  stagesEl.innerHTML = '';
  keys.forEach(key => {
    const stage = essay.stages[key];
    if (stage.status !== 'complete') return;
    const a = document.createElement('a');
    a.href = '#';
    a.dataset.file = stage.file;
    const badge = key.replace('00b-seeds', '00b').replace(/^(\d+).*/, '$1');
    a.innerHTML = '<span class="stage-badge">' + badge + '</span>' + stage.label;
    a.addEventListener('click', e => {
      e.preventDefault();
      loadFile(stage.file);
    });
    stagesEl.appendChild(a);
  });

  // Research links
  if (essay.research && essay.research.length > 0) {
    document.getElementById('research-label').style.display = '';
    const researchEl = document.getElementById('nav-research');
    researchEl.innerHTML = '';
    essay.research.forEach(r => {
      const a = document.createElement('a');
      a.href = '#';
      a.dataset.file = r.file;
      a.textContent = r.title;
      a.addEventListener('click', e => {
        e.preventDefault();
        loadFile(r.file);
      });
      researchEl.appendChild(a);
    });
  }
}

async function loadFile(filename) {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const resp = await fetch(filename);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    el.innerHTML = marked.parse(await resp.text());
    window.scrollTo({ top: 0 });
    document.querySelectorAll('nav a[data-file]').forEach(a => {
      a.classList.toggle('active', a.dataset.file === filename);
    });
    history.replaceState(null, '', '#' + filename);
  } catch (e) {
    el.innerHTML = '<div class="loading">Could not load ' + filename + '<br><small>' + e.message + '</small></div>';
  }
}

window.addEventListener('scroll', () => {
  document.querySelector('.scroll-top').classList.toggle('visible', window.scrollY > 400);
});

init();
</script>
</body>
</html>
